{{define "pixel/facebook/events.html"}}{{template "pixel_head" .}}
<section>
  <h2>Event log</h2>
  <form method="get">
    <label>Status <select name="status">
      <option value="">Semua</option>
      <option value="pending" {{if eq .StatusFilter "pending"}}selected{{end}}>pending</option>
      <option value="sent" {{if eq .StatusFilter "sent"}}selected{{end}}>sent</option>
      <option value="failed" {{if eq .StatusFilter "failed"}}selected{{end}}>failed</option>
    </select></label>
    <button type="submit">Filter</button>
  </form>
  <p>Total: {{.Total}}</p>
  <table>
    <thead><tr><th>ID</th><th>Event</th><th>Status</th><th>Waktu</th><th>Error</th></tr></thead>
    <tbody>
    {{range .Events}}
    <tr>
      <td>{{.ID}}</td>
      <td>{{.EventName}}</td>
      <td>{{.Status}}</td>
      <td>{{.CreatedAt}}</td>
      <td>{{.ErrorMessage}}</td>
    </tr>
    {{else}}
    <tr><td colspan="5">Tidak ada event.</td></tr>
    {{end}}
    </tbody>
  </table>
</section>
{{template "pixel_foot" .}}{{end}}
