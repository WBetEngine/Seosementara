<div class="drawer-header">
  <div>
    <h2>Tunnel route</h2>
    <span class="drawer-mode">Edit</span>
  </div>
  <button type="button" class="btn-icon" data-close-drawer aria-label="Tutup">×</button>
</div>
<div class="drawer-read-strip">
  <span>Push ke CF: PUT …/cfd_tunnel/{id}/configurations</span>
</div>
<div class="drawer-body">
  <div class="form-grid">
    <div class="form-row">
      <label>Hostname</label>
      <input value="seosementara.org" placeholder="seosementara.org atau *.seosementara.org" />
    </div>
    <div class="form-row">
      <label>Path prefix</label>
      <input value="/api" placeholder="/api atau kosong = semua path" />
    </div>
    <div class="form-row">
      <label>Service URL</label>
      <input value="http://127.0.0.1:8080" />
    </div>
    <div class="form-row" style="grid-column:1/-1">
      <label><input type="checkbox" checked /> Route aktif</label>
    </div>
  </div>
</div>
<div class="drawer-footer">
  <div class="drawer-footer__icons">
    <button type="button" class="btn-icon btn-icon--danger" title="Hapus route" disabled>🗑</button>
  </div>
  <div class="drawer-footer__actions">
    <button type="button" class="btn btn-outline" data-close-drawer>Batal</button>
    <button type="button" class="btn btn-primary">Simpan &amp; apply</button>
  </div>
</div>
