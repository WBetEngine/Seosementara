<div class="drawer-header">
  <div>
    <h2>Shortlink manual</h2>
    <span class="drawer-mode">Create</span>
  </div>
  <button type="button" class="btn-icon" data-close-drawer aria-label="Tutup">×</button>
</div>

<div class="drawer-body">
  <div class="form-grid">
    <div class="form-row">
      <label>Domain</label>
      <select><option>rezekibelanja.com</option></select>
    </div>
    <div class="form-row">
      <label>Kode</label>
      <input type="text" placeholder="promo2025" />
    </div>
    <div class="form-row" style="grid-column:1/-1">
      <label>URL tujuan</label>
      <input type="url" placeholder="https://…" />
    </div>
  </div>
</div>

<div class="drawer-footer">
  <div class="drawer-footer__icons"></div>
  <div class="drawer-footer__actions">
    <button type="button" class="btn btn-outline" data-close-drawer>Batal</button>
    <button type="button" class="btn btn-primary">Simpan</button>
  </div>
</div>
