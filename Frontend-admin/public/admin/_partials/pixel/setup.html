<div class="panel">
  <div class="panel__head">Setup — Meta Pixel &amp; CAPI</div>
  <div class="panel__body">
    <form class="form-grid" onsubmit="return false">
      <div class="form-row">
        <label for="fb-name">Nama konfigurasi</label>
        <input id="fb-name" name="name" value="Facebook Global" />
      </div>
      <div class="form-row">
        <label for="fb-pixel">Pixel ID</label>
        <input id="fb-pixel" name="pixel_id" required placeholder="1234567890" value="123456789012345" />
      </div>
      <div class="form-row">
        <label for="fb-biz">Business ID (opsional)</label>
        <input id="fb-biz" name="business_id" placeholder="987654321" />
      </div>
      <div class="form-row">
        <label for="fb-token">CAPI Access Token</label>
        <input id="fb-token" name="capi_access_token" type="password" placeholder="•••••••• (kosongkan jika tidak ubah)" />
      </div>
      <div class="form-row">
        <label for="fb-test">Test Event Code</label>
        <input id="fb-test" name="test_event_code" value="TEST12345" />
      </div>
      <div class="form-row" style="grid-column:1/-1">
        <label><input type="checkbox" checked /> Aktifkan CAPI (server-side)</label>
      </div>
      <div class="form-row" style="grid-column:1/-1">
        <label><input type="checkbox" /> Aktifkan browser pixel (hybrid)</label>
      </div>
    </form>
    <div style="margin-top:1.25rem;display:flex;flex-wrap:wrap;gap:0.5rem">
      <button type="button" class="btn btn-primary">Simpan setup</button>
      <button type="button" class="btn btn-outline">Uji koneksi CAPI</button>
      <button type="button" class="btn btn-outline">Kirim event uji (PageView)</button>
      <a href="https://business.facebook.com/events_manager" class="btn btn-outline" target="_blank" rel="noopener">Events Manager ↗</a>
    </div>
    <pre class="panel" style="margin-top:1rem;padding:0.75rem;font-size:0.8rem;background:#f9fafb">Prototype: POST /api/admin/pixel/facebook/setup (JSON)</pre>
  </div>
</div>
