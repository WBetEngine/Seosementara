<div class="alert alert-info" style="margin-bottom:1rem">
  <strong>Infra mini PC.</strong> Nilai disimpan ke <strong>GitHub Secrets</strong>, lalu workflow
  <em>Deploy Mini PC</em> inject ke Docker (tanpa file <code>.env</code>).
</div>

<div id="platform-status" class="panel" style="margin-bottom:1rem;font-size:0.9rem"></div>

<div class="panel">
  <div class="panel__head">PostgreSQL &amp; enkripsi</div>
  <div class="panel__body">
    <form id="form-infra" class="form-grid">
      <div class="form-row">
        <label for="db-password">DB_PASSWORD</label>
        <input id="db-password" name="db_password" type="password" required autocomplete="new-password" />
      </div>
      <div class="form-row">
        <label for="master-key">MASTER_ENCRYPTION_KEY</label>
        <input id="master-key" name="master_encryption_key" type="password" required autocomplete="new-password" />
        <p style="margin:0.35rem 0 0;font-size:0.75rem;color:var(--text-muted)">
          Base64 32 byte — jangan ganti setelah ada data terenkripsi di DB.
        </p>
      </div>
      <div class="form-row">
        <label for="super-token">SUPER_ADMIN_TOKEN (opsional)</label>
        <input id="super-token" name="super_admin_token" type="password" autocomplete="new-password" />
        <p style="margin:0.35rem 0 0;font-size:0.75rem;color:var(--text-muted)">
          Untuk API Go + admin-config.js (GitHub Secret).
        </p>
      </div>
    </form>
    <div id="infra-msg" class="alert" hidden style="margin-top:1rem"></div>
    <div style="margin-top:1.25rem">
      <button type="button" class="btn btn-primary" id="btn-save-infra">Simpan &amp; deploy mini PC</button>
    </div>
  </div>
</div>

<script src="/static/js/admin-platform.js"></script>
<script>
(function () {
  var form = document.getElementById("form-infra");
  var msg = document.getElementById("infra-msg");
  var status = document.getElementById("platform-status");
  if (window.SeosementaraPlatform && status) {
    SeosementaraPlatform.loadStatus(status).catch(function (e) {
      status.textContent = e.message;
    });
  }
    document.getElementById("btn-save-infra").addEventListener("click", function () {
    if (!form.reportValidity()) return;
    msg.hidden = true;
    SeosementaraPlatform.saveInfra(form, msg).catch(function (e) {
      msg.textContent = e.message;
      msg.hidden = false;
      msg.className = "alert alert-error";
    });
  });
})();
</script>
