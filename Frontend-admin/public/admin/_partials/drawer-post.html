<div class="drawer-header">
  <div>
    <h2>Edit post</h2>
    <span class="drawer-mode">Edit</span>
  </div>
  <button type="button" class="btn-icon" data-close-drawer aria-label="Tutup">×</button>
</div>

<div class="drawer-read-strip">
  <span><strong>Domain:</strong> rezekibelanja.com</span>
  <span><strong>Status:</strong> Draft</span>
</div>

<div class="drawer-body">
  <div class="form-grid">
    <div class="form-row" style="grid-column:1/-1">
      <label>Judul</label>
      <input type="text" value="Review bulan Mei" />
    </div>
    <div class="form-row" style="grid-column:1/-1">
      <label>Slug</label>
      <input type="text" value="review-bulan-mei" />
    </div>
    <div class="form-row">
      <label>Status</label>
      <select>
        <option>Draft</option>
        <option selected>Published</option>
      </select>
    </div>
    <div class="form-row">
      <label>Kategori</label>
      <select><option>Review</option></select>
    </div>
    <div class="form-row" style="grid-column:1/-1">
      <label>Meta description (SEO)</label>
      <textarea rows="2"></textarea>
    </div>
    <div class="form-row" style="grid-column:1/-1">
      <label>Konten</label>
      <textarea rows="8" placeholder="Editor WYSIWYG — fase berikutnya…"></textarea>
    </div>
  </div>
</div>

<div class="drawer-footer">
  <div class="drawer-footer__icons">
    <button type="button" class="btn-icon btn-icon--danger" title="Hapus">🗑</button>
  </div>
  <div class="drawer-footer__actions">
    <button type="button" class="btn btn-outline" data-close-drawer>Batal</button>
    <button type="button" class="btn btn-primary">Simpan</button>
  </div>
</div>
