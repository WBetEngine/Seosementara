<div class="panel">
  <div class="panel__head">Domain utama &amp; environment (setara .env)</div>
  <div class="panel__body">
    <p style="margin:0 0 1rem;font-size:0.875rem;color:var(--text-muted)">
      Disimpan di DB <code>domain_env_config</code> · variabel publik di-sync ke Pages via API. Secret hanya di env mini PC.
    </p>
    <form class="form-grid" onsubmit="return false">
      <div class="form-row">
        <label>PRIMARY_DOMAIN</label>
        <input value="seosementara.org" />
      </div>
      <div class="form-row">
        <label>APEX_URL</label>
        <input value="https://seosementara.org" />
      </div>
      <div class="form-row">
        <label>API_BASE_URL</label>
        <input value="https://seosementara.org" />
        <p style="margin:0.35rem 0 0;font-size:0.75rem;color:var(--text-muted)">Same-origin + Tunnel <code>/api</code> (disarankan)</p>
      </div>
      <div class="form-row">
        <label>ADMIN_BASE_PATH</label>
        <input value="/admin" />
      </div>
      <div class="form-row">
        <label>ENVIRONMENT</label>
        <select><option>production</option><option>staging</option></select>
      </div>
      <div class="form-row">
        <label>TURNSTILE_SITE_KEY (publik)</label>
        <input value="0x4AAAAAAA…" />
      </div>
      <div class="form-row" style="grid-column:1/-1">
        <label>Zone ID (produk)</label>
        <input value="zone_id_dari_test_koneksi" />
      </div>
    </form>
    <div style="margin-top:1.25rem;display:flex;gap:0.5rem;flex-wrap:wrap">
      <button type="button" class="btn btn-primary">Simpan</button>
      <button type="button" class="btn btn-outline">Sync ke Pages env</button>
      <button type="button" class="btn btn-outline">Test API_BASE_URL</button>
    </div>
    <div class="alert alert-warn" style="margin-top:1rem;margin-bottom:0">
      <strong>Tidak disync ke Pages:</strong> DATABASE_URL, SESSION_SECRET, MASTER_ENCRYPTION_KEY — hanya Docker env di mini PC.
    </div>
  </div>
</div>
