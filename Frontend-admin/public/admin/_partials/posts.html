<div class="page-header">
  <div>
    <h1 class="page-title">Post</h1>
    <p class="page-sub">Domain aktif: rezekibelanja.com</p>
  </div>
  <button type="button" class="btn btn-primary"
    hx-get="/admin/_partials/drawer-post.html"
    hx-target="#app-drawer"
    hx-swap="innerHTML">+ Post baru</button>
</div>

<div class="tabs">
  <button type="button" class="is-active">Semua</button>
  <button type="button">Published</button>
  <button type="button">Draft</button>
</div>

<div class="panel">
  <div class="panel__body table-wrap">
    <table class="data-table">
      <thead>
        <tr><th>Judul</th><th>Status</th><th>Tanggal</th><th></th></tr>
      </thead>
      <tbody>
        <tr>
          <td>Cara memilih produk terbaik</td>
          <td><span class="badge badge-success">Published</span></td>
          <td>2026-05-18</td>
          <td>
            <button type="button" class="btn btn-sm btn-outline"
              hx-get="/admin/_partials/drawer-post.html"
              hx-target="#app-drawer"
              hx-swap="innerHTML">Edit</button>
          </td>
        </tr>
        <tr>
          <td>Review bulan Mei</td>
          <td><span class="badge badge-muted">Draft</span></td>
          <td>2026-05-20</td>
          <td>
            <button type="button" class="btn btn-sm btn-outline"
              hx-get="/admin/_partials/drawer-post.html"
              hx-target="#app-drawer"
              hx-swap="innerHTML">Edit</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
