<div class="drawer-header">
  <div>
    <h2>Cloudflare API Token</h2>
    <span class="drawer-mode">Edit</span>
  </div>
  <button type="button" class="btn-icon" data-close-drawer aria-label="Tutup">×</button>
</div>

<div class="drawer-body">
  <div class="form-row">
    <label>Token baru <span class="hint" title="Disimpan terenkripsi di backend">(i)</span></label>
    <input type="password" placeholder="cfpat_…" autocomplete="off" />
  </div>
  <div class="form-row" style="margin-top:1rem">
    <label>Scope</label>
    <select>
      <option>Zone DNS + Tunnel + Pages</option>
    </select>
  </div>
</div>

<div class="drawer-footer">
  <div class="drawer-footer__icons"></div>
  <div class="drawer-footer__actions">
    <button type="button" class="btn btn-outline" data-close-drawer>Batal</button>
    <button type="button" class="btn btn-primary">Simpan</button>
  </div>
</div>
