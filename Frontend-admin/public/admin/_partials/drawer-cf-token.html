<div class="drawer-header">
  <div>
    <h2>Kredensial Cloudflare</h2>
    <span class="drawer-mode">Edit</span>
  </div>
  <button type="button" class="btn-icon" data-close-drawer aria-label="Tutup">×</button>
</div>
<div class="drawer-body">
  <p style="margin:0 0 1rem;font-size:0.85rem;color:var(--text-muted)">
    Alternatif drawer; form lengkap ada di tab <strong>Koneksi</strong>.
  </p>
  <div class="form-grid">
    <div class="form-row">
      <label>Tipe</label>
      <select>
        <option>API Token (scoped)</option>
        <option>Global API Key + Email</option>
      </select>
    </div>
    <div class="form-row">
      <label>Token / Key</label>
      <input type="password" placeholder="cfpat_… atau Global API Key" autocomplete="off" />
    </div>
    <div class="form-row">
      <label>Account ID</label>
      <input placeholder="Auto-fill setelah test" />
    </div>
  </div>
</div>
<div class="drawer-footer">
  <div></div>
  <div class="drawer-footer__actions">
    <button type="button" class="btn btn-outline" data-close-drawer>Batal</button>
    <button type="button" class="btn btn-outline">Test</button>
    <button type="button" class="btn btn-primary">Simpan</button>
  </div>
</div>
