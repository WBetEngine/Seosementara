<div class="breadcrumb">
  <span>Admin</span>
  <span class="breadcrumb__sep">/</span>
  <span>Settings</span>
</div>

<div class="page-header page-header--with-icon">
  <div class="page-header__icon" aria-hidden="true">
    <svg class="icon icon--lg"><use href="#i-users"/></svg>
  </div>
  <div>
    <h1 class="page-title">Settings</h1>
    <p class="page-sub">RBAC — Read / Edit / Write · pengguna &amp; peran sistem</p>
  </div>
</div>

<div class="settings-layout">
  <nav class="settings-subnav">
    <button type="button" class="is-active">RBAC &amp; pengguna</button>
    <button type="button"
      hx-get="/admin/_partials/settings-cloudflare.html"
      hx-target="#main"
      hx-swap="innerHTML"
      hx-push-url="/admin/settings/cloudflare">Cloudflare</button>
    <button type="button" disabled>Host &amp; subdomain</button>
  </nav>

  <div>
    <div class="panel">
      <div class="panel__head">Pengguna admin</div>
      <div class="panel__body table-wrap">
        <table class="data-table">
          <thead>
            <tr><th>Email</th><th>Peran</th><th>Status</th><th></th></tr>
          </thead>
          <tbody>
            <tr>
              <td>demo@seosementara.org</td>
              <td>super_admin</td>
              <td><span class="badge badge-success">Aktif</span></td>
              <td>
                <button type="button" class="btn btn-sm btn-outline"
                  hx-get="/admin/_partials/drawer-user.html"
                  hx-target="#app-drawer"
                  hx-swap="innerHTML">Edit</button>
              </td>
            </tr>
            <tr>
              <td>worker1@example.com</td>
              <td>worker</td>
              <td><span class="badge badge-success">Aktif</span></td>
              <td>
                <button type="button" class="btn btn-sm btn-outline"
                  hx-get="/admin/_partials/drawer-user.html"
                  hx-target="#app-drawer"
                  hx-swap="innerHTML">Edit</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
