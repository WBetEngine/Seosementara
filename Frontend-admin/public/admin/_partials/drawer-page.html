<div class="drawer-header">
  <h2>Edit halaman</h2>
  <span class="drawer-mode">Edit</span>
  <button type="button" class="btn-icon" data-close-drawer aria-label="Tutup">×</button>
</div>
<div class="drawer-read-strip">
  <span>Slug: /tentang</span>
  <span>Status: Published</span>
</div>
<div class="drawer-body">
  <div class="form-grid">
    <div class="form-row"><label>Judul</label><input value="Tentang kami" /></div>
    <div class="form-row"><label>Slug</label><input value="tentang" /></div>
    <div class="form-row" style="grid-column:1/-1"><label>Konten</label><textarea rows="6">Konten halaman…</textarea></div>
    <div class="form-row" style="grid-column:1/-1"><label>Meta description</label><textarea rows="2"></textarea></div>
  </div>
</div>
<div class="drawer-footer">
  <div></div>
  <div class="drawer-footer__actions">
    <button type="button" class="btn btn-outline" data-close-drawer>Batal</button>
    <button type="button" class="btn btn-primary">Simpan</button>
  </div>
</div>
