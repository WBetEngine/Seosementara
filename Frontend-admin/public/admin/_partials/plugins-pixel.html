<div class="breadcrumb">
  <span>Admin</span>
  <span class="breadcrumb__sep">/</span>
  <span>Plugins</span>
  <span class="breadcrumb__sep">/</span>
  <span>Pixel Hub</span>
</div>

<div class="page-header page-header--with-icon">
  <div class="page-header__icon" aria-hidden="true">
    <svg class="icon icon--lg"><use href="#i-target"/></svg>
  </div>
  <div>
    <h1 class="page-title">Pixel Hub — Facebook Pro</h1>
    <p class="page-sub">Konten dari <code>templates/pixel/facebook/</code> · kolaborasi Meta CAPI (mock data)</p>
  </div>
</div>

<div class="plugin-grid" style="margin-bottom:1rem">
  <article class="plugin-card" style="border-color:var(--accent)">
    <h3>Facebook</h3>
    <p>7 modul aktif di tab bawah (Overview → Analytics)</p>
  </article>
  <article class="plugin-card" style="opacity:0.65">
    <h3>TikTok</h3>
    <p>Placeholder — fase berikutnya</p>
  </article>
  <article class="plugin-card" style="opacity:0.65">
    <h3>Google Ads</h3>
    <p>Placeholder — fase berikutnya</p>
  </article>
</div>

<nav class="page-tabs pixel-fb-tabs" role="tablist" aria-label="Facebook Pixel">
  <button type="button" class="is-active" data-page-tab="overview"
    hx-get="/admin/_partials/pixel/overview.html"
    hx-target="#pixel-tab-panel" hx-swap="innerHTML"
    hx-push-url="/admin/plugins/pixel/facebook">Overview</button>
  <button type="button" data-page-tab="setup"
    hx-get="/admin/_partials/pixel/setup.html"
    hx-target="#pixel-tab-panel" hx-swap="innerHTML"
    hx-push-url="/admin/plugins/pixel/facebook/setup">Setup</button>
  <button type="button" data-page-tab="connection"
    hx-get="/admin/_partials/pixel/connection.html"
    hx-target="#pixel-tab-panel" hx-swap="innerHTML"
    hx-push-url="/admin/plugins/pixel/facebook/connection">Connection</button>
  <button type="button" data-page-tab="domains"
    hx-get="/admin/_partials/pixel/domains.html"
    hx-target="#pixel-tab-panel" hx-swap="innerHTML"
    hx-push-url="/admin/plugins/pixel/facebook/domains">Domains</button>
  <button type="button" data-page-tab="diagnostics"
    hx-get="/admin/_partials/pixel/diagnostics.html"
    hx-target="#pixel-tab-panel" hx-swap="innerHTML"
    hx-push-url="/admin/plugins/pixel/facebook/diagnostics">Diagnostics</button>
  <button type="button" data-page-tab="events"
    hx-get="/admin/_partials/pixel/events.html"
    hx-target="#pixel-tab-panel" hx-swap="innerHTML"
    hx-push-url="/admin/plugins/pixel/facebook/events">Events</button>
  <button type="button" data-page-tab="analytics"
    hx-get="/admin/_partials/pixel/analytics.html"
    hx-target="#pixel-tab-panel" hx-swap="innerHTML"
    hx-push-url="/admin/plugins/pixel/facebook/analytics">Analytics</button>
</nav>

<div id="pixel-tab-panel"
  hx-get="/admin/_partials/pixel/overview.html"
  hx-trigger="load"
  hx-swap="innerHTML">
  <p class="empty-state">Memuat…</p>
</div>
