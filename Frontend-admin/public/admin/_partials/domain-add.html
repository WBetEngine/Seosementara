<div class="panel">
  <div class="panel__head">Tambah domain portfolio</div>
  <div class="panel__body">
    <p style="margin:0 0 1.25rem;color:var(--text-muted);font-size:0.9rem">
      Daftarkan hostname baru ke CMS native. DNS &amp; Cloudflare dikonfigurasi di langkah berikutnya.
    </p>
    <form class="form-grid" style="max-width:520px" onsubmit="return false">
      <div class="form-row">
        <label for="hostname">Hostname</label>
        <input id="hostname" type="text" placeholder="contoh.com" autocomplete="off" />
      </div>
      <div class="form-row">
        <label for="owner">Owner (pekerja)</label>
        <select id="owner">
          <option>Anda (demo@seosementara.org)</option>
          <option>worker1@example.com</option>
        </select>
      </div>
      <div class="form-row" style="grid-column:1/-1">
        <label for="notes">Catatan internal</label>
        <textarea id="notes" rows="3" placeholder="Opsional"></textarea>
      </div>
    </form>
    <div style="margin-top:1.25rem;display:flex;gap:0.5rem">
      <button type="button" class="btn btn-primary">Simpan domain</button>
      <button type="button" class="btn btn-outline"
        hx-get="/admin/_partials/domain-mine.html"
        hx-target="#page-tab-panel"
        hx-swap="innerHTML"
        hx-push-url="/admin/domain">Batal</button>
    </div>
  </div>
</div>
