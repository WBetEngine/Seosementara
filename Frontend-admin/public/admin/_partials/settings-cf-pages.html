<div class="panel" style="margin-bottom:1rem">
  <div class="panel__head">Proyek Pages — Admin UI</div>
  <div class="panel__body">
    <form class="form-grid" onsubmit="return false">
      <div class="form-row">
        <label>Nama proyek CF</label>
        <input value="seosementara" />
      </div>
      <div class="form-row">
        <label>Repo GitHub</label>
        <input value="WBetEngine/Seosementara" />
      </div>
      <div class="form-row">
        <label>Root directory</label>
        <input value="Frontend-admin" />
      </div>
      <div class="form-row">
        <label>Production branch</label>
        <input value="main" />
      </div>
      <div class="form-row">
        <label>Build command</label>
        <input value="npm ci" />
      </div>
      <div class="form-row">
        <label>Deploy command</label>
        <input value="npx wrangler deploy" />
      </div>
    </form>
    <p style="margin:1rem 0 0;font-size:0.85rem">
      URL preview: <a href="https://seosementara.seosementara3.workers.dev" target="_blank" rel="noopener">seosementara.seosementara3.workers.dev</a>
      · Status: <span class="badge badge-success">success</span> · Deploy terakhir: 2 jam lalu
    </p>
    <button type="button" class="btn btn-outline" style="margin-top:0.75rem">Trigger deploy (CF API)</button>
  </div>
</div>
