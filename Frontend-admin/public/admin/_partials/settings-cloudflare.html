<div class="breadcrumb">
  <span>Admin</span>
  <span class="breadcrumb__sep">/</span>
  <span>Settings</span>
</div>

<div class="page-header page-header--with-icon">
  <div class="page-header__icon" aria-hidden="true">
    <svg class="icon icon--lg"><use href="#i-cloud"/></svg>
  </div>
  <div>
    <h1 class="page-title">Settings — Cloudflare</h1>
    <p class="page-sub">Tunnel, Pages (free), DNS — domain produk</p>
  </div>
</div>

<div class="settings-layout">
  <nav class="settings-subnav">
    <button type="button"
      hx-get="/admin/_partials/settings-rbac.html"
      hx-target="#main"
      hx-swap="innerHTML"
      hx-push-url="/admin/settings/rbac">RBAC &amp; pengguna</button>
    <button type="button" class="is-active">Cloudflare</button>
    <button type="button" disabled>Host &amp; subdomain</button>
  </nav>

  <div>
    <div class="tabs">
      <button type="button" class="is-active">Koneksi</button>
      <button type="button">Tunnel</button>
      <button type="button">Pages</button>
      <button type="button">DNS</button>
    </div>
    <div class="panel">
      <div class="panel__head">API Token (masked)</div>
      <div class="panel__body">
        <p style="margin:0 0 1rem"><code>cfpat_••••••••xxxx</code> — valid</p>
        <button type="button" class="btn btn-outline"
          hx-get="/admin/_partials/drawer-cf-token.html"
          hx-target="#app-drawer"
          hx-swap="innerHTML">Edit token</button>
        <button type="button" class="btn btn-primary" style="margin-left:0.5rem">Test koneksi</button>
      </div>
    </div>
  </div>
</div>
