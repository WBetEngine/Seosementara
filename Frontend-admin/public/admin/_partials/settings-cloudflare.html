<div class="breadcrumb">
  <span>Admin</span>
  <span class="breadcrumb__sep">/</span>
  <span>Settings</span>
  <span class="breadcrumb__sep">/</span>
  <span>Cloudflare</span>
</div>

<div class="page-header page-header--with-icon">
  <div class="page-header__icon" aria-hidden="true">
    <svg class="icon icon--lg"><use href="#i-cloud"/></svg>
  </div>
  <div>
    <h1 class="page-title">Settings — Cloudflare</h1>
    <p class="page-sub">Kelola kredensial, Tunnel, Pages, DNS dari admin — tanpa dashboard Cloudflare (Plan/15)</p>
  </div>
</div>

<div class="settings-layout">
  <nav class="settings-subnav">
    <button type="button"
      hx-get="/admin/_partials/settings-rbac.html"
      hx-target="#main" hx-swap="innerHTML"
      hx-push-url="/admin/settings/rbac">RBAC &amp; pengguna</button>
    <button type="button" class="is-active">Cloudflare</button>
    <button type="button"
      hx-get="/admin/_partials/settings-host.html"
      hx-target="#main" hx-swap="innerHTML"
      hx-push-url="/admin/settings/host">Host &amp; subdomain</button>
  </nav>

  <div>
    <nav class="page-tabs" role="tablist" aria-label="Tab Cloudflare">
      <button type="button" class="is-active" data-page-tab="koneksi"
        data-hx-static="/admin/_partials/settings-cf-koneksi.html"
        data-hx-api="/api/admin/settings/cloudflare/koneksi"
        hx-get="/admin/_partials/settings-cf-koneksi.html"
        hx-target="#cf-tab-panel" hx-swap="innerHTML"
        hx-push-url="/admin/settings/cloudflare/koneksi">Koneksi</button>
      <button type="button" data-page-tab="domain"
        data-hx-api="/api/admin/settings/cloudflare/domain"
        hx-get="/admin/_partials/settings-cf-domain.html"
        hx-target="#cf-tab-panel" hx-swap="innerHTML"
        hx-push-url="/admin/settings/cloudflare/domain">Domain &amp; env</button>
      <button type="button" data-page-tab="tunnel"
        data-hx-api="/api/admin/settings/cloudflare/tunnel"
        hx-get="/admin/_partials/settings-cf-tunnel.html"
        hx-target="#cf-tab-panel" hx-swap="innerHTML"
        hx-push-url="/admin/settings/cloudflare/tunnel">Tunnel</button>
      <button type="button" data-page-tab="pages"
        data-hx-api="/api/admin/settings/cloudflare/pages"
        hx-get="/admin/_partials/settings-cf-pages.html"
        hx-target="#cf-tab-panel" hx-swap="innerHTML"
        hx-push-url="/admin/settings/cloudflare/pages">Pages</button>
      <button type="button" data-page-tab="dns"
        data-hx-api="/api/admin/settings/cloudflare/dns"
        hx-get="/admin/_partials/settings-cf-dns.html"
        hx-target="#cf-tab-panel" hx-swap="innerHTML"
        hx-push-url="/admin/settings/cloudflare/dns">DNS</button>
    </nav>

    <div id="cf-tab-panel"
      hx-get="/admin/_partials/settings-cf-koneksi.html"
      hx-trigger="load"
      hx-swap="innerHTML">
      <p class="empty-state">Memuat…</p>
    </div>
  </div>
</div>
