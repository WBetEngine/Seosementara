<div class="alert alert-info" style="margin-bottom:1rem">
  <strong>Cloudflare.</strong> Global API Key disimpan ke <strong>Workers Secrets</strong> (bukan mini PC, bukan GitHub).
  API: <code>POST /admin/api/platform/cloudflare/credentials</code>
</div>

<div class="panel">
  <div class="panel__head">Kredensial Cloudflare</div>
  <div class="panel__body">
    <form id="form-cf-creds" class="form-grid" onsubmit="return false">
      <div class="form-row">
        <label for="cf-auth-type">Tipe autentikasi</label>
        <select id="cf-auth-type" name="auth_type">
          <option value="api_token">API Token (scoped)</option>
          <option value="global_api_key" selected>Global API Key + Email</option>
        </select>
      </div>
      <div class="form-row" id="cf-token-row" hidden>
        <label for="cf-token">API Token</label>
        <input id="cf-token" name="api_token" type="password" autocomplete="off" />
      </div>
      <div class="form-row" id="cf-global-row">
        <label for="cf-global-key">Global API Key</label>
        <input id="cf-global-key" name="global_api_key" type="password" autocomplete="off" required />
      </div>
      <div class="form-row" id="cf-email-row">
        <label for="cf-email">Email akun Cloudflare</label>
        <input id="cf-email" name="account_email" type="email" required />
      </div>
      <div class="form-row">
        <label for="cf-account-id">Account ID</label>
        <input id="cf-account-id" name="account_id" placeholder="Wajib untuk simpan Workers Secret" required />
      </div>
    </form>

    <div id="cf-msg" class="alert" hidden style="margin-top:1rem"></div>
    <div style="margin-top:1.25rem;display:flex;flex-wrap:gap:0.5rem">
      <button type="button" class="btn btn-primary" id="btn-cf-save">Test &amp; Simpan ke Workers</button>
    </div>
  </div>
</div>

<script src="/static/js/admin-platform.js"></script>
<script>
(function () {
  var sel = document.getElementById("cf-auth-type");
  var form = document.getElementById("form-cf-creds");
  var msg = document.getElementById("cf-msg");
  function toggle() {
    var legacy = sel.value === "global_api_key";
    document.getElementById("cf-token-row").hidden = legacy;
    document.getElementById("cf-global-row").hidden = !legacy;
    document.getElementById("cf-email-row").hidden = !legacy;
    document.getElementById("cf-global-key").required = legacy;
    document.getElementById("cf-token").required = !legacy;
  }
  sel.addEventListener("change", toggle);
  toggle();
  document.getElementById("btn-cf-save").addEventListener("click", function () {
    if (!form.reportValidity()) return;
    msg.hidden = true;
    SeosementaraPlatform.saveCloudflare(form, msg, false).catch(function (e) {
      msg.textContent = e.message;
      msg.hidden = false;
      msg.className = "alert alert-error";
    });
  });
})();
</script>
