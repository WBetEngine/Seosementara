<div class="breadcrumb">
  <span>Admin</span>
  <span class="breadcrumb__sep">/</span>
  <span>Domain</span>
</div>

<div class="page-header page-header--with-icon">
  <div class="page-header__icon" aria-hidden="true">
    <svg class="icon icon--lg"><use href="#i-domain"/></svg>
  </div>
  <div>
    <h1 class="page-title">Domain</h1>
    <p class="page-sub">Kelola portfolio native CMS — milik, dibagikan, dan tambah domain baru</p>
  </div>
</div>

<nav class="page-tabs" role="tablist" aria-label="Tab domain">
  <button type="button" class="is-active" data-page-tab="mine" role="tab" aria-selected="true"
    hx-get="/admin/_partials/domain-mine.html"
    hx-target="#page-tab-panel"
    hx-swap="innerHTML"
    hx-push-url="/admin/domain">Domain saya</button>
  <button type="button" data-page-tab="shared" role="tab"
    hx-get="/admin/_partials/domain-shared.html"
    hx-target="#page-tab-panel"
    hx-swap="innerHTML"
    hx-push-url="/admin/domain/shared">Dibagikan ke saya</button>
  <button type="button" data-page-tab="add" role="tab"
    hx-get="/admin/_partials/domain-add.html"
    hx-target="#page-tab-panel"
    hx-swap="innerHTML"
    hx-push-url="/admin/domain/add">Tambah domain</button>
  <button type="button" data-page-tab="all" role="tab"
    hx-get="/admin/_partials/domain-all.html"
    hx-target="#page-tab-panel"
    hx-swap="innerHTML"
    hx-push-url="/admin/domain/all">Semua domain <span class="nav-link__badge" style="margin-left:0.25rem">SA</span></button>
</nav>

<div id="page-tab-panel"
  hx-get="/admin/_partials/domain-mine.html"
  hx-trigger="load"
  hx-swap="innerHTML">
  <p class="empty-state">Memuat…</p>
</div>
