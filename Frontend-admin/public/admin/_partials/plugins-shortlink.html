<div class="breadcrumb">
  <span>Admin</span>
  <span class="breadcrumb__sep">/</span>
  <span>Plugins</span>
  <span class="breadcrumb__sep">/</span>
  <span>Shortlink</span>
</div>

<div class="page-header page-header--with-icon">
  <div class="page-header__icon" aria-hidden="true">
    <svg class="icon icon--lg"><use href="#i-link"/></svg>
  </div>
  <div>
    <h1 class="page-title">Shortlink</h1>
    <p class="page-sub">Auto &amp; manual per domain · tracking via Cloudflare</p>
  </div>
  <button type="button" class="btn btn-primary"
    hx-get="/admin/_partials/drawer-shortlink.html"
    hx-target="#app-drawer"
    hx-swap="innerHTML">+ Shortlink baru</button>
</div>

<div class="stat-grid">
  <div class="stat-card">
    <div class="stat-card__value">12</div>
    <div class="stat-card__label">Aktif (domain ini)</div>
  </div>
  <div class="stat-card">
    <div class="stat-card__value">3</div>
    <div class="stat-card__label">Draft</div>
  </div>
  <div class="stat-card">
    <div class="stat-card__value">48k</div>
    <div class="stat-card__label">Klik 30 hari</div>
  </div>
</div>

<div class="panel">
  <div class="panel__head">Shortlink domain aktif — rezekibelanja.com</div>
  <div class="panel__body table-wrap">
    <table class="data-table">
      <thead>
        <tr><th>Slug</th><th>Target</th><th>Status</th><th></th></tr>
      </thead>
      <tbody>
        <tr>
          <td><code>/go/promo-mei</code></td>
          <td>/artikel/promo-mei-2026</td>
          <td><span class="badge badge-success">Aktif</span></td>
          <td>
            <button type="button" class="btn btn-sm btn-outline"
              hx-get="/admin/_partials/drawer-shortlink.html"
              hx-target="#app-drawer"
              hx-swap="innerHTML">Edit</button>
          </td>
        </tr>
        <tr>
          <td><code>/go/wa</code></td>
          <td>https://wa.me/628xxx</td>
          <td><span class="badge badge-success">Aktif</span></td>
          <td>
            <button type="button" class="btn btn-sm btn-outline"
              hx-get="/admin/_partials/drawer-shortlink.html"
              hx-target="#app-drawer"
              hx-swap="innerHTML">Edit</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
