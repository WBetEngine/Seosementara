<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="csrf" content="prototype-static" />
  <title>Admin — Seosementara CMS</title>
  <link rel="stylesheet" href="/static/css/admin.css" />
  <script src="/static/js/htmx.min.js"></script>
</head>
<body class="admin-body" hx-headers='{"X-CSRF-Token": "prototype-static"}'>
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
    <symbol id="i-layout" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></symbol>
    <symbol id="i-globe" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></symbol>
    <symbol id="i-building" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M10 6h4M10 10h4M10 14h4M10 18h4"/></symbol>
    <symbol id="i-shield" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></symbol>
    <symbol id="i-domain" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2v20M2 12h20"/></symbol>
    <symbol id="i-file" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></symbol>
    <symbol id="i-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></symbol>
    <symbol id="i-link" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></symbol>
    <symbol id="i-target" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></symbol>
    <symbol id="i-settings" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></symbol>
    <symbol id="i-users" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></symbol>
    <symbol id="i-cloud" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></symbol>
    <symbol id="i-server" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><path d="M6 6h.01M6 18h.01"/></symbol>
    <symbol id="i-bell" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></symbol>
    <symbol id="i-menu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></symbol>
  </svg>

  <div id="sidebar-overlay" class="sidebar-overlay" aria-hidden="true"></div>

  <aside id="admin-sidebar" class="admin-sidebar" aria-label="Navigasi utama">
    <div class="admin-sidebar__brand">
      <div class="admin-sidebar__logo" aria-hidden="true">SS</div>
      <div>
        <div class="admin-sidebar__title">Seosementara</div>
        <div class="admin-sidebar__tagline">CMS Portfolio</div>
      </div>
    </div>

    <div class="admin-sidebar__site">
      <div class="admin-sidebar__site-label">Domain aktif</div>
      <div class="admin-sidebar__site-value">rezekibelanja.com</div>
    </div>

    <nav class="admin-sidebar__nav">
      <div class="nav-group">
        <div class="nav-group__title">Ringkasan</div>
        <ul class="nav-group__items">
          <li>
            <button type="button" class="nav-link is-active" data-nav="/admin/dashboard"
              hx-get="/admin/_partials/dashboard-admin.html"
              hx-target="#main" hx-swap="innerHTML"
              hx-push-url="/admin/dashboard">
              <svg class="icon" aria-hidden="true"><use href="#i-layout"/></svg>
              Dashboard Admin
            </button>
          </li>
          <li>
            <button type="button" class="nav-link" data-nav="/admin/dashboard/domain"
              hx-get="/admin/_partials/dashboard-domain.html"
              hx-target="#main" hx-swap="innerHTML"
              hx-push-url="/admin/dashboard/domain">
              <svg class="icon" aria-hidden="true"><use href="#i-building"/></svg>
              Dashboard Domain
            </button>
          </li>
          <li>
            <button type="button" class="nav-link" data-nav="/admin/dashboard/global"
              hx-get="/admin/_partials/dashboard-global.html"
              hx-target="#main" hx-swap="innerHTML"
              hx-push-url="/admin/dashboard/global">
              <svg class="icon" aria-hidden="true"><use href="#i-shield"/></svg>
              Dashboard Global
              <span class="nav-link__badge">SA</span>
            </button>
          </li>
        </ul>
      </div>

      <div class="nav-group">
        <div class="nav-group__title">Domain</div>
        <ul class="nav-group__items">
          <li>
            <button type="button" class="nav-link" data-nav="/admin/domain"
              hx-get="/admin/_partials/domain.html"
              hx-target="#main" hx-swap="innerHTML"
              hx-push-url="/admin/domain">
              <svg class="icon" aria-hidden="true"><use href="#i-domain"/></svg>
              Domain
            </button>
          </li>
        </ul>
      </div>

      <div class="nav-group">
        <div class="nav-group__title">Konten</div>
        <ul class="nav-group__items">
          <li>
            <button type="button" class="nav-link" data-nav="/admin/posts"
              hx-get="/admin/_partials/posts.html"
              hx-target="#main" hx-swap="innerHTML"
              hx-push-url="/admin/posts">
              <svg class="icon" aria-hidden="true"><use href="#i-file"/></svg>
              Post
            </button>
          </li>
          <li>
            <button type="button" class="nav-link" disabled>
              <svg class="icon" aria-hidden="true"><use href="#i-file"/></svg>
              Halaman
              <span class="nav-link__badge nav-link__badge--soon">Segera</span>
            </button>
          </li>
          <li>
            <button type="button" class="nav-link" disabled>
              <svg class="icon" aria-hidden="true"><use href="#i-file"/></svg>
              Kategori &amp; tag
              <span class="nav-link__badge nav-link__badge--soon">Segera</span>
            </button>
          </li>
          <li>
            <button type="button" class="nav-link" disabled>
              <svg class="icon" aria-hidden="true"><use href="#i-file"/></svg>
              Media
              <span class="nav-link__badge nav-link__badge--soon">Segera</span>
            </button>
          </li>
        </ul>
      </div>

      <div class="nav-group">
        <div class="nav-group__title">SEO &amp; pertumbuhan</div>
        <ul class="nav-group__items">
          <li>
            <button type="button" class="nav-link" disabled>
              <svg class="icon" aria-hidden="true"><use href="#i-search"/></svg>
              Meta &amp; schema
              <span class="nav-link__badge nav-link__badge--soon">Segera</span>
            </button>
          </li>
          <li>
            <button type="button" class="nav-link" disabled>
              <svg class="icon" aria-hidden="true"><use href="#i-globe"/></svg>
              Sitemap &amp; robots
              <span class="nav-link__badge nav-link__badge--soon">Segera</span>
            </button>
          </li>
          <li>
            <button type="button" class="nav-link" disabled>
              <svg class="icon" aria-hidden="true"><use href="#i-link"/></svg>
              Redirect
              <span class="nav-link__badge nav-link__badge--soon">Segera</span>
            </button>
          </li>
        </ul>
      </div>

      <div class="nav-group">
        <div class="nav-group__title">Plugins</div>
        <ul class="nav-group__items">
          <li>
            <button type="button" class="nav-link" data-nav="/admin/plugins/shortlink"
              hx-get="/admin/_partials/plugins-shortlink.html"
              hx-target="#main" hx-swap="innerHTML"
              hx-push-url="/admin/plugins/shortlink">
              <svg class="icon" aria-hidden="true"><use href="#i-link"/></svg>
              Shortlink
            </button>
          </li>
          <li>
            <button type="button" class="nav-link" data-nav="/admin/plugins/pixel"
              hx-get="/admin/_partials/plugins-pixel.html"
              hx-target="#main" hx-swap="innerHTML"
              hx-push-url="/admin/plugins/pixel">
              <svg class="icon" aria-hidden="true"><use href="#i-target"/></svg>
              Pixel Hub
            </button>
          </li>
        </ul>
      </div>

      <div class="nav-group">
        <div class="nav-group__title">Settings</div>
        <ul class="nav-group__items">
          <li>
            <button type="button" class="nav-link" data-nav="/admin/settings/rbac"
              hx-get="/admin/_partials/settings-rbac.html"
              hx-target="#main" hx-swap="innerHTML"
              hx-push-url="/admin/settings/rbac">
              <svg class="icon" aria-hidden="true"><use href="#i-users"/></svg>
              RBAC &amp; pengguna
            </button>
          </li>
          <li>
            <button type="button" class="nav-link" data-nav="/admin/settings/cloudflare"
              hx-get="/admin/_partials/settings-cloudflare.html"
              hx-target="#main" hx-swap="innerHTML"
              hx-push-url="/admin/settings/cloudflare">
              <svg class="icon" aria-hidden="true"><use href="#i-cloud"/></svg>
              Cloudflare
            </button>
          </li>
          <li>
            <button type="button" class="nav-link" disabled>
              <svg class="icon" aria-hidden="true"><use href="#i-server"/></svg>
              Host &amp; subdomain
              <span class="nav-link__badge nav-link__badge--soon">Segera</span>
            </button>
          </li>
        </ul>
      </div>
    </nav>

    <div class="admin-sidebar__footer">
      Prototype UI · backend HTMX besok
    </div>
  </aside>

  <div class="admin-main-wrap">
    <header class="admin-topbar">
      <button type="button" class="topbar-btn topbar-btn--menu" data-toggle-sidebar aria-label="Menu">
        <svg class="icon" aria-hidden="true"><use href="#i-menu"/></svg>
      </button>
      <div class="site-switcher">
        <input type="search" placeholder="Cari domain portfolio…" aria-label="Site switcher"
          hx-get="/admin/_partials/site-switcher-results.html"
          hx-trigger="keyup changed delay:300ms"
          hx-target="#site-switcher-results" />
        <div id="site-switcher-results"></div>
      </div>
      <button type="button" class="topbar-btn" aria-label="Notifikasi">
        <svg class="icon" aria-hidden="true"><use href="#i-bell"/></svg>
      </button>
      <div class="topbar-user">
        <div class="topbar-user__avatar" aria-hidden="true">D</div>
        <div class="topbar-user__meta">
          <span>demo@seosementara.org</span>
          <span class="topbar-user__role">Super Admin</span>
        </div>
      </div>
    </header>

    <div class="admin-content">
      <div class="alert alert-info">
        <strong>Prototype UI v2</strong> — navigasi &amp; desain diperbarui. Data contoh; API Go menyusul.
      </div>
      <main id="main"
        hx-get="/admin/_partials/dashboard-admin.html"
        hx-trigger="load"
        hx-swap="innerHTML">
        <p class="empty-state">Memuat…</p>
      </main>
    </div>
  </div>

  <div id="drawer-backdrop" class="drawer-backdrop" aria-hidden="true"></div>
  <aside id="app-drawer" class="app-drawer" aria-hidden="true" aria-label="Panel edit"></aside>

  <script src="/static/js/admin-shell.js" defer></script>
</body>
</html>
