# Admin UI: Workers Assets + platform API (GitHub Secrets, CF Workers Secrets)
# Panduan: mini-pc/DEPLOY.md

name = "seosementara"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
GITHUB_REPO = "WBetEngine/Seosementara"
GITHUB_ENVIRONMENT = "production"
WORKER_SCRIPT_NAME = "seosementara"

# Secrets (dari admin Bootstrap, atau wrangler secret put):
# GITHUB_SETUP_TOKEN — PAT GitHub (disimpan admin + Environment production)
# CF_GLOBAL_API_KEY, CF_ACCOUNT_EMAIL, CF_ACCOUNT_ID

[assets]
directory = "./public"
binding = "ASSETS"
