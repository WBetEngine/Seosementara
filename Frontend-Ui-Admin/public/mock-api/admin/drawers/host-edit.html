<div class="drawer-header">
  <h2>Edit host produk</h2>
  <button type="button" class="btn-icon" onclick="closeDrawer()" aria-label="Tutup">×</button>
</div>
<form class="drawer-body form-grid form-grid--2" data-demo-form data-storage-key="sseo_host_edit" data-close-drawer>
  <div class="form-group"><label>Hostname</label><input class="form-control" name="hostname" value="url.seosementara.org"></div>
  <div class="form-group"><label>Template ID</label><select class="form-control" name="template"><option>subdomain_url</option><option>subdomain_bola</option><option>apex_default</option></select></div>
  <div class="form-group"><label><input type="checkbox" name="enabled" checked> Aktif</label></div>
</form>
<div class="drawer-footer">
  <div></div>
  <div class="drawer-footer__actions">
    <button type="button" class="btn btn--secondary" onclick="closeDrawer()">Batal</button>
    <button type="button" class="btn btn--primary" onclick="document.querySelector('#app-drawer form').requestSubmit()">Simpan</button>
  </div>
</div>
