<div class="drawer-header">
  <h2>Tambah domain</h2>
  <button type="button" class="btn-icon" onclick="closeDrawer()" aria-label="Tutup">×</button>
</div>
<form class="drawer-body form-grid form-grid--2" data-demo-form data-storage-key="sseo_domain_new" data-close-drawer>
  <div class="form-group"><label>Hostname</label><input class="form-control" name="hostname" placeholder="toko-baru.com" required></div>
  <div class="form-group"><label>Label internal</label><input class="form-control" name="name" placeholder="Toko Baru"></div>
  <div class="form-group" style="grid-column:1/-1"><label><input type="checkbox" name="auto_shortlink" checked> Buat shortlink otomatis</label></div>
</form>
<div class="drawer-footer">
  <div></div>
  <div class="drawer-footer__actions">
    <button type="button" class="btn btn--secondary" onclick="closeDrawer()">Batal</button>
    <button type="button" class="btn btn--primary" onclick="document.querySelector('#app-drawer form').requestSubmit()">Simpan</button>
  </div>
</div>
