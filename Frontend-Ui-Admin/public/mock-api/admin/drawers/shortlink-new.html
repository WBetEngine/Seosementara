<div class="drawer-header">
  <h2>Buat shortlink manual</h2>
  <button type="button" class="btn-icon" onclick="closeDrawer()" aria-label="Tutup">×</button>
</div>
<form class="drawer-body form-grid" data-demo-form data-storage-key="sseo_shortlink_new" data-close-drawer>
  <div class="form-group"><label>Target URL</label><input class="form-control" name="target" type="url" required placeholder="https://…"></div>
  <div class="form-group"><label>Kode (opsional)</label><input class="form-control" name="code" placeholder="promo2025"></div>
  <div class="form-group"><label>Judul</label><input class="form-control" name="title"></div>
</form>
<div class="drawer-footer">
  <div></div>
  <div class="drawer-footer__actions">
    <button type="button" class="btn btn--secondary" onclick="closeDrawer()">Batal</button>
    <button type="button" class="btn btn--primary" onclick="document.querySelector('#app-drawer form').requestSubmit()">Buat</button>
  </div>
</div>
