<button type="button" class="topbar-btn" data-sidebar-toggle aria-label="Buka menu">
  <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
</button>
<span class="topbar-title" id="topbar-title">Admin</span>
<div class="site-switcher">
  <input type="search" placeholder="Cari domain…" aria-label="Site switcher"
         list="domain-suggestions"
         id="site-switcher-input">
  <datalist id="domain-suggestions">
    <option value="toko-abc.com">
    <option value="rezekibelanja.com">
    <option value="blog-xyz.net">
  </datalist>
</div>
<div class="topbar-actions">
  <a class="topbar-btn" href="/admin/settings/index.html" aria-label="Notifikasi" title="Notifikasi">
    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 10-12 0c0 7-3 7-3 7h18s-3 0-3-7"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
  </a>
  <a class="btn btn--ghost btn--sm" href="/admin/login.html">Keluar</a>
</div>
<script>
  (function () {
    var input = document.getElementById('site-switcher-input');
    if (input) {
      input.addEventListener('change', function () {
        if (!input.value) return;
        localStorage.setItem('active_managed_domain_name', input.value);
        localStorage.setItem('active_managed_domain_id', 'demo-1');
        var el = document.getElementById('sidebar-active-domain');
        if (el) el.textContent = input.value;
        if (window.showToast) showToast('Domain aktif: ' + input.value, 'success');
      });
    }
    var t = document.getElementById('page-title');
    if (t) {
      var tt = document.getElementById('topbar-title');
      if (tt) tt.textContent = t.textContent;
    }
  })();
</script>
