# Deploy ke mini PC — self-hosted runner, inject GitHub Secrets → Docker (tanpa .env).
# Dipicu: push backend image / manual / admin panel (workflow_dispatch).

name: Deploy Mini PC

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Deploy Backend API"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-mini-pc
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: self-hosted
    environment: production
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Sync runtime files
        shell: powershell
        run: |
          $root = "C:\Seosementara"
          New-Item -ItemType Directory -Path "$root\Backend\migrations" -Force | Out-Null
          New-Item -ItemType Directory -Path "$root\scripts" -Force | Out-Null
          Copy-Item docker-compose.prod.yml $root -Force
          Copy-Item Backend/migrations/*.up.sql "$root\Backend\migrations\" -Force
          Copy-Item scripts/mini-pc-deploy.ps1 "$root\scripts\" -Force

      - name: Log in to GHCR
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.PLATFORM_GITHUB_PAT }}

      - name: Deploy Docker stack
        shell: powershell
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MASTER_ENCRYPTION_KEY: ${{ secrets.MASTER_ENCRYPTION_KEY }}
          SUPER_ADMIN_TOKEN: ${{ secrets.SUPER_ADMIN_TOKEN }}
        run: |
          Set-Location C:\Seosementara
          & .\scripts\mini-pc-deploy.ps1
