# Deploy ke mini PC — self-hosted runner + file .env di C:\Seosementara.
# Setup sekali: buat .env + pasang runner (lihat mini-pc/DEPLOY.md).

name: Deploy Mini PC

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Deploy Backend API"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-mini-pc
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Sync runtime files
        shell: powershell
        run: |
          $root = "C:\Seosementara"
          New-Item -ItemType Directory -Path "$root\Backend\migrations" -Force | Out-Null
          New-Item -ItemType Directory -Path "$root\scripts" -Force | Out-Null
          Copy-Item docker-compose.prod.yml $root -Force
          Copy-Item mini-pc/env.example "$root\env.example" -Force
          Copy-Item Backend/migrations/*.up.sql "$root\Backend\migrations\" -Force
          Copy-Item scripts/load-dotenv.ps1,scripts/mini-pc-remote-deploy.ps1,scripts/bootstrap-cloudflare.ps1 "$root\scripts\" -Force

      - name: Deploy Docker stack
        shell: powershell
        run: |
          Set-Location C:\Seosementara
          if (-not (Test-Path .env)) {
            throw ".env belum ada di C:\Seosementara. Salin env.example ke .env dan isi secret (lihat mini-pc/DEPLOY.md)."
          }
          & .\scripts\mini-pc-remote-deploy.ps1
