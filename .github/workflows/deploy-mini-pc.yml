# Deploy ke mini PC — self-hosted runner, inject GitHub Secrets → Docker (tanpa .env).
# Dipicu: push backend image / manual / admin panel (workflow_dispatch).

name: Deploy Mini PC

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Deploy Backend API"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-mini-pc
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: self-hosted
    environment: production
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure runner Windows service (auto registration token)
        continue-on-error: true
        shell: powershell
        env:
          PLATFORM_GITHUB_PAT: ${{ secrets.PLATFORM_GITHUB_PAT }}
        run: |
          $svc = Get-Service | Where-Object { $_.Name -like "actions.runner.*" } | Select-Object -First 1
          if ($svc -and $svc.Status -eq "Running") {
            Write-Host "Runner service sudah jalan: $($svc.Name)"
            exit 0
          }
          if (-not $env:PLATFORM_GITHUB_PAT) {
            Write-Host "Skip: PLATFORM_GITHUB_PAT kosong"
            exit 0
          }
          $script = "$env:GITHUB_WORKSPACE\scripts\install-github-runner-service-auto.ps1"
          if (-not (Test-Path $script)) { exit 0 }
          & $script -GitHubPat $env:PLATFORM_GITHUB_PAT

      - name: Sync runtime files
        shell: powershell
        run: |
          $root = "C:\Seosementara"
          New-Item -ItemType Directory -Path "$root\Backend\migrations" -Force | Out-Null
          New-Item -ItemType Directory -Path "$root\scripts" -Force | Out-Null
          Copy-Item docker-compose.prod.yml $root -Force
          Copy-Item Backend/migrations/*.up.sql "$root\Backend\migrations\" -Force
          Copy-Item scripts/mini-pc-deploy.ps1 "$root\scripts\" -Force
          Copy-Item scripts/mini-pc-diagnostics.ps1 "$root\scripts\" -Force -ErrorAction SilentlyContinue
          Copy-Item scripts/install-github-runner-service-auto.ps1 "$root\scripts\" -Force -ErrorAction SilentlyContinue

      - name: Log in to GHCR
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.PLATFORM_GITHUB_PAT }}

      - name: Deploy Docker stack
        shell: powershell
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MASTER_ENCRYPTION_KEY: ${{ secrets.MASTER_ENCRYPTION_KEY }}
          SUPER_ADMIN_TOKEN: ${{ secrets.SUPER_ADMIN_TOKEN }}
        run: |
          Set-Location C:\Seosementara
          & .\scripts\mini-pc-deploy.ps1
