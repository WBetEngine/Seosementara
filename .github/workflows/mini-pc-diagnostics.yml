# Diagnostics mini PC — jalan di self-hosted runner (tanpa SSH dari cloud agent)

name: Mini PC Diagnostics

on:
  workflow_dispatch:
  schedule:
  # Setiap 6 jam — cek runner masih hidup
    - cron: "0 */6 * * *"

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Sync diagnostics script
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path C:\Seosementara\scripts -Force | Out-Null
          Copy-Item scripts/mini-pc-diagnostics.ps1 C:\Seosementara\scripts\ -Force

      - name: Run diagnostics
        id: diag
        shell: powershell
        run: |
          $json = & C:\Seosementara\scripts\mini-pc-diagnostics.ps1
          Write-Host $json
          "report<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $json | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Summary
        shell: bash
        run: |
          echo "## Mini PC Diagnostics" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.diag.outputs.report }}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
