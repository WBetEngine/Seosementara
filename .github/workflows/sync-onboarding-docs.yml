# Salin Frontend-Onboarding → docs/ agar Pages "Deploy from a branch" + folder /docs jalan
name: Sync onboarding to docs

on:
  push:
    branches: [main]
    paths:
      - 'Frontend-Onboarding/**'
      - '.github/workflows/sync-onboarding-docs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy public → docs
        run: |
          rm -rf docs
          cp -r Frontend-Onboarding/public docs

      - name: Commit docs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore(pages): sync Frontend-Onboarding ke docs/'
          file_pattern: docs/**
