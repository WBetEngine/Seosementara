# Deploy admin UI — Workers + platform API.
# Secret: Repository Secrets (bootstrap) atau Environment production (setelah bootstrap admin).

name: Deploy Admin UI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "Frontend-admin/**"
      - ".github/workflows/deploy-admin.yml"

permissions:
  actions: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Tanpa `environment:` — pakai Repository Secrets (Settings → Secrets and variables → Actions)
    # Setelah Bootstrap admin, secret juga disalin ke Environment `production`.
    steps:
      - uses: actions/checkout@v4

      - name: Ensure GitHub Environment production
        continue-on-error: true
        run: |
          curl -fsS -X PUT \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/environments/production" \
            -d '{}' || echo "Lewati: environment dibuat nanti via Bootstrap admin"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate admin-config.js
        shell: bash
        env:
          SUPER_ADMIN_TOKEN: ${{ secrets.SUPER_ADMIN_TOKEN }}
        run: |
          cd Frontend-admin
          cp public/static/js/admin-config.example.js public/static/js/admin-config.js
          if [ -n "$SUPER_ADMIN_TOKEN" ]; then
            node -e "
              const fs = require('fs');
              const p = 'public/static/js/admin-config.js';
              let s = fs.readFileSync(p, 'utf8');
              s = s.replace('window.SEOSEMENTARA_SUPER_ADMIN_TOKEN = \"\";',
                'window.SEOSEMENTARA_SUPER_ADMIN_TOKEN = ' + JSON.stringify(process.env.SUPER_ADMIN_TOKEN) + ';');
              fs.writeFileSync(p, s);
            "
          fi

      - name: Deploy Workers
        working-directory: Frontend-admin
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_ACCOUNT_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm ci
          if [ -z "$CLOUDFLARE_API_KEY" ] || [ -z "$CLOUDFLARE_EMAIL" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Isi Repository Secrets: CLOUDFLARE_API_KEY, CLOUDFLARE_ACCOUNT_EMAIL, CLOUDFLARE_ACCOUNT_ID"
            echo "https://github.com/WBetEngine/Seosementara/settings/secrets/actions"
            exit 1
          fi
          npx wrangler deploy
