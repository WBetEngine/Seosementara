# Opsi A: build image di GitHub → GHCR → (opsional) SSH deploy ke mini PC.
# Aktifkan deploy: Settings → Secrets and variables → Actions → Variables → MINI_PC_DEPLOY = true

name: Deploy Backend API

on:
  push:
    branches: [main]
    paths:
      - "Backend/**"
      - "Frontend-admin/public/admin/_partials/**"
      - "Frontend-admin/static/**"
      - "Frontend-admin/templates/**"
      - "Backend/Dockerfile"
      - "docker-compose.yml"
      - "docker-compose.prod.yml"
      - ".github/workflows/deploy-backend.yml"
      - ".dockerignore"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/seosementara-api
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-mini-pc:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: vars.MINI_PC_DEPLOY == 'true'
    steps:
      - name: Trigger sync workflow
        run: |
          echo "Image pushed — Sync Mini PC workflow akan jalan via workflow_run hook."
          echo "Pastikan Secrets DEPLOY_* dan MINI_PC_DOTENV sudah diisi."

  deploy-webhook:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: vars.MINI_PC_DEPLOY == 'webhook'
    steps:
      - name: Trigger mini PC webhook
        env:
          WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
        run: |
          curl -fsS -X POST "$WEBHOOK_URL" \
            -H "Authorization: Bearer $WEBHOOK_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"event":"deploy-backend","ref":"${{ github.sha }}"}'
