# Build image → GHCR. Deploy mini PC manual: docker compose pull && up (lihat mini-pc/DEPLOY.md).

name: Deploy Backend API

on:
  push:
    branches: [main]
    paths:
      - "Backend/**"
      - "Frontend-admin/public/admin/_partials/**"
      - "Frontend-admin/public/static/**"
      - "Frontend-admin/templates/**"
      - "Backend/Dockerfile"
      - "docker-compose.prod.yml"
      - ".github/workflows/deploy-backend.yml"
      - ".dockerignore"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/seosementara-api
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
