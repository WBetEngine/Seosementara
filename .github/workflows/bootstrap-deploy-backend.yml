name: Bootstrap — Deploy Backend (Docker)

on:
  repository_dispatch:
    types: [bootstrap-deploy-backend]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Docker di mini PC via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        with:
          host: ${{ secrets.BOOTSTRAP_SSH_HOST }}
          port: ${{ secrets.BOOTSTRAP_SSH_PORT || 22 }}
          username: ${{ secrets.BOOTSTRAP_SSH_USER }}
          password: ${{ secrets.BOOTSTRAP_SSH_PASSWORD }}
          envs: DB_PASSWORD
          script_stop: true
          script: |
            set -e
            DEPLOY_DIR="$HOME/sse-deploy"
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"
            if [ ! -d Seosementara ]; then
              git clone https://github.com/WBetEngine/Seosementara.git
            fi
            cd Seosementara/Backend
            git pull origin main || true
            export DB_PASSWORD="$DB_PASSWORD"
            docker compose pull || true
            docker compose up -d
            docker compose ps
