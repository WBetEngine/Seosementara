# GitHub Actions → Mini PC via SSH (cadangan jika ada IP publik).
# Disarankan: self-hosted runner — deploy-mini-pc-local.yml

name: Sync Mini PC

on:
  workflow_dispatch:

concurrency:
  group: sync-mini-pc
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare deploy bundle
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MASTER_ENCRYPTION_KEY: ${{ secrets.MASTER_ENCRYPTION_KEY }}
          SUPER_ADMIN_TOKEN: ${{ secrets.SUPER_ADMIN_TOKEN }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ACCOUNT_EMAIL: ${{ secrets.CLOUDFLARE_ACCOUNT_EMAIL }}
          CLOUDFLARE_TUNNEL_ID: ${{ secrets.CLOUDFLARE_TUNNEL_ID }}
        run: |
          set -e
          export DB_PASSWORD MASTER_ENCRYPTION_KEY SUPER_ADMIN_TOKEN
          export CLOUDFLARE_API_KEY CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_ACCOUNT_EMAIL CLOUDFLARE_TUNNEL_ID
          mkdir -p bundle/Backend/migrations bundle/scripts
          cp docker-compose.prod.yml bundle/
          cp Backend/migrations/*.up.sql bundle/Backend/migrations/
          cp scripts/mini-pc-*.ps1 scripts/apply-migrations.ps1 scripts/bootstrap-cloudflare.ps1 bundle/scripts/ 2>/dev/null || true
          envsubst < mini-pc/production.env.template > bundle/.env
          tar czf deploy-bundle.tar.gz -C bundle .

      - name: Upload bundle to mini PC
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          source: deploy-bundle.tar.gz
          target: ${{ secrets.DEPLOY_PATH || 'C:/Seosementara' }}
          overwrite: true

      - name: Extract and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          script_stop: true
          script: |
            powershell -NoProfile -Command "
              \$root = '${{ secrets.DEPLOY_PATH || 'C:/Seosementara' }}'.Replace('/','\');
              Set-Location \$root;
              tar -xzf deploy-bundle.tar.gz;
              Remove-Item deploy-bundle.tar.gz -Force;
              & (Join-Path \$root 'scripts\mini-pc-remote-deploy.ps1')
            "
