name: Bootstrap — Deploy Public Pages

on:
  repository_dispatch:
    types: [bootstrap-deploy-public-pages]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Frontend-Publik ke Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy Frontend-Publik/public --project-name=seosementara-public
          workingDirectory: .
