# Deploy langsung di mini PC via self-hosted runner.
# Setup sekali: scripts/install-github-runner.ps1
# Secret: isi di GitHub → Settings → Secrets (lihat mini-pc/GITHUB-SECRETS-LIST.md)

name: Deploy Mini PC (local)

on:
  workflow_dispatch:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Deploy Backend API"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-mini-pc-local
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Build .env and sync to C:\Seosementara
        shell: powershell
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MASTER_ENCRYPTION_KEY: ${{ secrets.MASTER_ENCRYPTION_KEY }}
          SUPER_ADMIN_TOKEN: ${{ secrets.SUPER_ADMIN_TOKEN }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ACCOUNT_EMAIL: ${{ secrets.CLOUDFLARE_ACCOUNT_EMAIL }}
          CLOUDFLARE_TUNNEL_ID: ${{ secrets.CLOUDFLARE_TUNNEL_ID }}
        run: |
          $root = "C:\Seosementara"
          New-Item -ItemType Directory -Path "$root\Backend\migrations" -Force | Out-Null
          New-Item -ItemType Directory -Path "$root\scripts" -Force | Out-Null
          Copy-Item docker-compose.prod.yml $root -Force
          Copy-Item Backend/migrations/*.up.sql "$root\Backend\migrations\" -Force
          Copy-Item scripts/mini-pc-remote-deploy.ps1,scripts/bootstrap-cloudflare.ps1,scripts/mini-pc-pull.ps1 "$root\scripts\" -Force
          $t = Get-Content mini-pc/production.env.template -Raw
          $t = $t.Replace('${DB_PASSWORD}', $env:DB_PASSWORD)
          $t = $t.Replace('${MASTER_ENCRYPTION_KEY}', $env:MASTER_ENCRYPTION_KEY)
          $t = $t.Replace('${SUPER_ADMIN_TOKEN}', $env:SUPER_ADMIN_TOKEN)
          $t = $t.Replace('${CLOUDFLARE_API_KEY}', $env:CLOUDFLARE_API_KEY)
          $t = $t.Replace('${CLOUDFLARE_ACCOUNT_ID}', $env:CLOUDFLARE_ACCOUNT_ID)
          $t = $t.Replace('${CLOUDFLARE_ACCOUNT_EMAIL}', $env:CLOUDFLARE_ACCOUNT_EMAIL)
          $t = $t.Replace('${CLOUDFLARE_TUNNEL_ID}', $env:CLOUDFLARE_TUNNEL_ID)
          Set-Content -Path "$root\.env" -Value $t -Encoding UTF8

      - name: Deploy Docker stack
        shell: powershell
        run: |
          Set-Location C:\Seosementara
          & .\scripts\mini-pc-remote-deploy.ps1
