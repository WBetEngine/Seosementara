name: Deploy Platform Worker

on:
  push:
    branches: [main]
    paths:
      - 'platform-worker/**'
      - '.github/workflows/deploy-workers-platform.yml'
  repository_dispatch:
    types: [bootstrap-deploy-platform-worker]
  workflow_dispatch:
    inputs:
      cloudflare_api_token:
        description: 'Cloudflare API Token (deploy pertama / tanpa secret repo)'
        required: false
        type: string
      cloudflare_account_id:
        description: 'Cloudflare Account ID (32 hex)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: platform-worker/package-lock.json

      - name: Install dependencies
        working-directory: platform-worker
        run: npm install

      - name: Patch KV namespace id
        working-directory: platform-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ github.event.inputs.cloudflare_api_token || secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ github.event.inputs.cloudflare_account_id || secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          KV_ID="${{ secrets.PLATFORM_KV_ID }}"
          if [ -n "$KV_ID" ]; then
            sed -i "s/PLACEHOLDER_KV_ID/${KV_ID}/" wrangler.toml
            echo "KV dari secret PLATFORM_KV_ID"
            exit 0
          fi
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN kosong — deploy akan gagal jika PLACEHOLDER_KV_ID belum diganti manual"
            exit 0
          fi
          EXISTING=$(npx wrangler kv namespace list 2>/dev/null | node -e "
            let d='';process.stdin.on('data',c=>d+=c);
            process.stdin.on('end',()=>{
              try {
                const arr=JSON.parse(d);
                const n=arr.find(x=>x.title==='SETUP_KV');
                if(n&&n.id) console.log(n.id);
              } catch(e) {}
            });
          " || true)
          if [ -z "$EXISTING" ]; then
            EXISTING=$(npx wrangler kv namespace create SETUP_KV 2>&1 | grep -oE '[a-f0-9]{32}' | head -1 || true)
          fi
          if [ -n "$EXISTING" ]; then
            sed -i "s/PLACEHOLDER_KV_ID/${EXISTING}/" wrangler.toml
            echo "::notice title=SETUP_KV::id=${EXISTING} — simpan sebagai GitHub secret PLATFORM_KV_ID agar deploy berikutnya konsisten"
          else
            echo "::warning::Gagal membuat/menemukan KV SETUP_KV — set secret PLATFORM_KV_ID atau ganti PLACEHOLDER_KV_ID di wrangler.toml"
          fi

      - name: Deploy to Cloudflare Workers
        id: wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ github.event.inputs.cloudflare_api_token || secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ github.event.inputs.cloudflare_account_id || secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: platform-worker
          command: deploy

      - name: Tulis URL API untuk onboarding UI
        run: |
          URL="${{ steps.wrangler.outputs.deployment-url }}"
          if [ -z "$URL" ]; then
            echo "deployment-url kosong — set manual di config.js"
            exit 0
          fi
          echo "window.__SSE_PLATFORM_API__ = '${URL%/}';" > Frontend-Onboarding/public/assets/js/platform-api-url.js
          cp Frontend-Onboarding/public/assets/js/platform-api-url.js docs/assets/js/platform-api-url.js 2>/dev/null || true

      - name: Commit platform API URL
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update platform worker API URL for onboarding'
          file_pattern: |
            Frontend-Onboarding/public/assets/js/platform-api-url.js
            docs/assets/js/platform-api-url.js
