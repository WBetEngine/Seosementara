name: Deploy Platform Worker

on:
  push:
    branches: [main]
    paths:
      - 'platform-worker/**'
      - '.github/workflows/deploy-workers-platform.yml'
  repository_dispatch:
    types: [bootstrap-deploy-platform-worker]
  workflow_dispatch:
    inputs:
      cloudflare_api_token:
        description: 'Cloudflare API Token (deploy pertama / tanpa secret repo)'
        required: false
        type: string
      cloudflare_account_id:
        description: 'Cloudflare Account ID (32 hex)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: platform-worker/package-lock.json

      - name: Install dependencies
        working-directory: platform-worker
        run: npm install

      - name: Siapkan KV namespace (SETUP_KV)
        working-directory: platform-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ github.event.inputs.cloudflare_api_token || secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ github.event.inputs.cloudflare_account_id || secrets.CLOUDFLARE_ACCOUNT_ID }}
          PLATFORM_KV_ID: ${{ secrets.PLATFORM_KV_ID }}
        run: bash scripts/ensure-setup-kv.sh

      - name: Deploy to Cloudflare Workers
        id: wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ github.event.inputs.cloudflare_api_token || secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ github.event.inputs.cloudflare_account_id || secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: platform-worker
          command: deploy

      - name: Tulis URL API untuk onboarding UI
        run: |
          URL="${{ steps.wrangler.outputs.deployment-url }}"
          if [ -z "$URL" ]; then
            echo "::warning::deployment-url kosong — tempel URL manual di onboarding (langkah 2c)"
            exit 0
          fi
          echo "window.__SSE_PLATFORM_API__ = '${URL%/}';" > Frontend-Onboarding/public/assets/js/platform-api-url.js
          cp Frontend-Onboarding/public/assets/js/platform-api-url.js docs/assets/js/platform-api-url.js 2>/dev/null || true
          echo "Platform API URL: $URL"

      - name: Commit platform API URL
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update platform worker API URL for onboarding'
          file_pattern: |
            Frontend-Onboarding/public/assets/js/platform-api-url.js
            docs/assets/js/platform-api-url.js
