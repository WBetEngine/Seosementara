name: Deploy Platform Worker

on:
  push:
    branches: [main]
    paths:
      - 'Frontend-Onboarding/**'
      - '.github/workflows/deploy-workers-platform.yml'
  repository_dispatch:
    types: [bootstrap-deploy-platform-worker]
  workflow_dispatch:
    inputs:
      cloudflare_api_token:
        description: 'Isi jika secret CLOUDFLARE_API_TOKEN belum ada (kosongkan jika secret sudah di-set)'
        required: false
        type: string
      cloudflare_account_id:
        description: 'Isi jika secret CLOUDFLARE_ACCOUNT_ID belum ada'
        required: false
        type: string

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      WORKER_DIR: Frontend-Onboarding/platform-worker
      UI_PUBLIC: Frontend-Onboarding/public
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Frontend-Onboarding/platform-worker/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.WORKER_DIR }}
        run: npm install

      - name: Cek kredensial Cloudflare
        run: |
          if [ -z "${{ github.event.inputs.cloudflare_api_token || secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN kosong."
            echo "Isi salah satu:"
            echo "  1) Repo Settings → Secrets → Actions → CLOUDFLARE_API_TOKEN"
            echo "  2) Run workflow lagi dan isi field cloudflare_api_token"
            exit 1
          fi
          if [ -z "${{ github.event.inputs.cloudflare_account_id || secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID kosong."
            exit 1
          fi
          echo "Kredensial Cloudflare terdeteksi (dari secret atau workflow input)."

      - name: Siapkan KV namespace (SETUP_KV)
        working-directory: ${{ env.WORKER_DIR }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ github.event.inputs.cloudflare_api_token || secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ github.event.inputs.cloudflare_account_id || secrets.CLOUDFLARE_ACCOUNT_ID }}
          PLATFORM_KV_ID: ${{ secrets.PLATFORM_KV_ID }}
        run: bash scripts/ensure-setup-kv.sh

      - name: Deploy to Cloudflare Workers
        id: wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ github.event.inputs.cloudflare_api_token || secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ github.event.inputs.cloudflare_account_id || secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: Frontend-Onboarding/platform-worker
          command: deploy

      - name: Tulis URL API untuk onboarding UI
        run: |
          URL="${{ steps.wrangler.outputs.deployment-url }}"
          if [ -z "$URL" ]; then
            echo "::warning::deployment-url kosong — tempel URL manual di onboarding (langkah 2c)"
            exit 0
          fi
          echo "window.__SSE_PLATFORM_API__ = '${URL%/}';" > ${{ env.UI_PUBLIC }}/assets/js/platform-api-url.js
          echo "Platform API URL: $URL"

      - name: Commit platform API URL
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore(onboarding): update platform worker API URL'
          file_pattern: Frontend-Onboarding/public/assets/js/platform-api-url.js
