# Deploy Frontend-Onboarding ke GitHub Pages (first-boot wizard)
name: Deploy Onboarding (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'Frontend-Onboarding/**'
      - '.github/workflows/pages-onboarding.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-onboarding
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Frontend-Onboarding/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
