# Production mini PC — pull image GHCR. Env dari process (GitHub Actions), bukan file .env.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: seosementara
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      POSTGRES_DB: seosementara
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./Backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seosementara"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    image: ghcr.io/wbetengine/seosementara-api:latest
    pull_policy: always
    ports:
      - "8080:8080"
    environment:
      ADDR: ":8080"
      DATABASE_URL: postgres://seosementara:${DB_PASSWORD}@db:5432/seosementara?sslmode=disable
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY:?MASTER_ENCRYPTION_KEY required}
      PIXEL_ENCRYPTION_KEY: ${PIXEL_ENCRYPTION_KEY:-}
      SUPER_ADMIN_TOKEN: ${SUPER_ADMIN_TOKEN:?SUPER_ADMIN_TOKEN required}
      ADMIN_PARTIALS_DIR: /app/partials
      STATIC_DIR: /app/static
      ADMIN_TEMPLATES_DIR: /app/templates
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
