# Mini PC production: pull image dari GHCR (tanpa source code / build lokal).
# Salin ke C:\Seosementara bersama .env lalu:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: seosementara
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: seosementara
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./Backend/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seosementara"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    image: ghcr.io/wbetengine/seosementara-api:latest
    pull_policy: always
    ports:
      - "8080:8080"
    environment:
      ADDR: ":8080"
      DATABASE_URL: postgres://seosementara:${DB_PASSWORD:-changeme}@db:5432/seosementara?sslmode=disable
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY}
      PIXEL_ENCRYPTION_KEY: ${PIXEL_ENCRYPTION_KEY:-}
      SUPER_ADMIN_TOKEN: ${SUPER_ADMIN_TOKEN:-dev-super-admin-token}
      ALLOW_SETUP_WITHOUT_AUTH: ${ALLOW_SETUP_WITHOUT_AUTH:-false}
      ADMIN_PARTIALS_DIR: /app/partials
      STATIC_DIR: /app/static
      ADMIN_TEMPLATES_DIR: /app/templates
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
