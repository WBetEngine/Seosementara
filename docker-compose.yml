services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: seosementara
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: seosementara
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./Backend/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seosementara"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./Backend
    ports:
      - "8080:8080"
    environment:
      ADDR: ":8080"
      DATABASE_URL: postgres://seosementara:${DB_PASSWORD:-changeme}@db:5432/seosementara?sslmode=disable
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY}
      PIXEL_ENCRYPTION_KEY: ${PIXEL_ENCRYPTION_KEY:-}
      SUPER_ADMIN_TOKEN: ${SUPER_ADMIN_TOKEN:-dev-super-admin-token}
      ALLOW_SETUP_WITHOUT_AUTH: ${ALLOW_SETUP_WITHOUT_AUTH:-false}
      ADMIN_PARTIALS_DIR: /app/partials
      STATIC_DIR: /app/static
      ADMIN_TEMPLATES_DIR: /app/templates
    volumes:
      - ./Frontend-admin/public/admin/_partials:/app/partials:ro
      - ./Frontend-admin/static:/app/static:ro
      - ./Frontend-admin/templates:/app/templates:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
